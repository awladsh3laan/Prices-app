<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>قائمة أسعار - منتجات شعلان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ef4444">
</head>
<body>

    <div class="container">

        <!-- ===== Header ===== -->
        <header class="app-header">
            <div class="logo-section">
                <div class="app-logo">
                    <i class="fas fa-star"></i>
                </div>
                <div class="title-wrapper">
                    <h1>
                        قائمة <span>أسعار</span>
                        <span class="offline-badge">
                            <i class="fas fa-wifi"></i> Offline
                        </span>
                    </h1>
                    <div class="subtitle">
                        <i class="fas fa-circle-check"></i>
                        منتجات <span style="font-weight:600; color:#0f172a;">شعلان</span>
                        <i class="fas fa-circle-check"></i>
                    </div>
                </div>
            </div>

            <button class="hamburger" onclick="toggleHamburger()" aria-label="القائمة">
                <i class="fas fa-bars"></i>
            </button>

            <nav class="nav-menu" id="navMenu">
                <a href="index.html" class="active"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="dashboard.html"><i class="fas fa-cog"></i> لوحة التحكم</a>
                <a href="login.html"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</a>
            </nav>
        </header>

        <div class="sub-head">
            <i class="fas fa-store-alt"></i>
            جميع المنتجات محدثة — <span class="highlight">سعر البيع للمستهلك</span>
            <i class="fas fa-tag"></i>
        </div>

        <!-- ===== Search ===== -->
        <div class="search-wrap">
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن منتج بالاسم أو الرقم ..." autofocus>
                <i class="fas fa-search search-icon"></i>
                <span class="search-clear" id="clearSearch">
                    <i class="fas fa-times"></i>
                </span>
            </div>
        </div>

        <!-- ===== Products Grid ===== -->
        <div class="products-grid" id="productGrid">
            <div style="text-align:center; padding:60px; grid-column:1/-1;">
                <i class="fas fa-spinner fa-spin" style="font-size:2rem; color:var(--primary-red);"></i>
                <p style="margin-top:12px; color:#94a3b8;">جاري تحميل المنتجات...</p>
            </div>
        </div>

        <div class="stats">
            <i class="fas fa-database"></i>
            تم تحميل <span id="statsTotal">0</span> منتج — يعمل بدون اتصال بالإنترنت
        </div>
    </div>

    <!-- ===== Toast ===== -->
    <div class="toast-message" id="toastMessage">
        <i class="fas fa-check-circle"></i>
        <span id="toastText">تم التحديث بنجاح</span>
    </div>

    <!-- ===== Footer ===== -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-divider"></div>
            <div class="footer-brand">
                <span class="signature-icon">
                    <i class="fas fa-crown"></i>
                </span>
                <span>
                    تم إنشاء هذه الصفحة بواسطة <span class="name">مصطفى علوان</span>
                </span>
                <span style="color:#94a3b8; font-weight:400; font-size:0.9rem;">
                    <i class="fas fa-heart" style="color:#ef4444; font-size:0.8rem;"></i>
                </span>
            </div>
            <div class="footer-sub">
                <i class="fas fa-calendar-alt"></i>
                <span id="currentYear"></span>
                <span>•</span>
                <i class="fas fa-mobile-alt"></i>
                <span>تطبيق يعمل بدون إنترنت</span>
                <span>•</span>
                <i class="fas fa-shield-alt"></i>
                <span>جميع الحقوق محفوظة</span>
            </div>
        </div>
    </footer>

    <!-- ===== Firebase ===== -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>

    <script>
        // ================================================================
        //  عرض المنتجات
        // ================================================================

        const grid = document.getElementById('productGrid');
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearSearch');
        const statsTotal = document.getElementById('statsTotal');
        let allProducts = [];

        // جلب المنتجات من Firebase
        async function loadProducts() {
            try {
                const products = await getProducts();
                allProducts = products;
                statsTotal.textContent = products.length;
                renderProducts(products);
            } catch (error) {
                console.error('خطأ في تحميل المنتجات:', error);
                grid.innerHTML = `
                    <div class="no-result">
                        <i class="fas fa-circle-exclamation"></i>
                        حدث خطأ في تحميل المنتجات
                        <br><span style="font-size:0.9rem; color:#94a3b8;">يرجى تحديث الصفحة</span>
                    </div>
                `;
            }
        }

        function renderProducts(products, filter = '') {
            const filterLower = filter.trim().toLowerCase();
            let filtered = products;

            if (filterLower !== '') {
                filtered = products.filter(p =>
                    (p.name && p.name.toLowerCase().includes(filterLower)) ||
                    (p.id && p.id.toString().includes(filterLower))
                );
            }

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="no-result">
                        <i class="fas fa-box-open"></i>
                        لا توجد منتجات تطابق "<strong>${filter}</strong>"
                        <br><span style="font-size:0.9rem; color:#94a3b8;">جرب كلمة بحث مختلفة</span>
                    </div>
                `;
                return;
            }

            let html = '';
            filtered.forEach((p, index) => {
                const icon = getProductIcon(p.name || '');
                const retailDisplay = p.retailPrice && p.retailPrice !== '-' ? p.retailPrice : 'غير محدد';
                const wholesaleDisplay = p.wholesalePrice || 0;
                const id = p.id || String(index + 1).padStart(3, '0');

                html += `
                    <div class="product-card" style="animation-delay: ${index * 0.05}s">
                        <div class="product-id">#${id}</div>
                        <div class="product-name">
                            <i class="fas ${icon}"></i> ${p.name || 'بدون اسم'}
                        </div>
                        <div class="product-details">
                            ${p.unit ? `<span><i class="fas fa-box"></i> الوحدة: ${p.unit}</span>` : ''}
                            ${p.unitQty ? `<span><i class="fas fa-cubes"></i> الكمية: ${p.unitQty}</span>` : ''}
                            <span><i class="fas fa-coins"></i> الجملة: ${wholesaleDisplay} جنيه</span>
                            ${p.piecePrice ? `<span><i class="fas fa-dollar-sign"></i> القطعة: ${p.piecePrice} جنيه</span>` : ''}
                        </div>
                        <div class="product-price-wrapper">
                            <span class="price-label">
                                <i class="fas fa-tag"></i> سعر البيع
                            </span>
                            <span class="product-price">${retailDisplay} جنيه</span>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        // ================================================================
        //  البحث
        // ================================================================

        searchInput.addEventListener('input', function() {
            const val = this.value;
            renderProducts(allProducts, val);
            clearBtn.classList.toggle('visible', val.length > 0);
        });

        clearBtn.addEventListener('click', function() {
            searchInput.value = '';
            renderProducts(allProducts, '');
            this.classList.remove('visible');
            searchInput.focus();
        });

        // ================================================================
        //  تحميل الصفحة
        // ================================================================

        document.getElementById('currentYear').textContent = new Date().getFullYear();
        loadProducts();

        // ================================================================
        //  Service Worker
        // ================================================================

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('✅ Service Worker مسجل'))
                .catch(err => console.log('❌ خطأ في SW:', err));
        }
    </script>

</body>
</html>
