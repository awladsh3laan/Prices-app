<html lang="ar" dir="rtl">
<head>

    <link rel="manifest" href="./manifest.json">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fc;
            padding: 20px;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            flex: 1;
        }

        /* ===== Header ===== */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffffff, #f0f4ff);
            padding: 20px 28px;
            border-radius: 28px;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.08);
            border: 1px solid #e2e9f5;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .app-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.3);
            flex-shrink: 0;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0f2b4b;
        }
        h1 span {
            color: #2563eb;
        }

        .offline-badge {
            background: #22c55e;
            color: white;
            font-size: 0.7rem;
            padding: 4px 16px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            margin-right: 8px;
        }

        .header-stats {
            display: flex;
            align-items: center;
            gap: 18px;
            font-size: 0.9rem;
            color: #475569;
            background: #f8fafc;
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
        }
        .header-stats .count {
            font-weight: 700;
            color: #0f2b4b;
            font-size: 1.1rem;
        }

        .sub-head {
            text-align: center;
            color: #475569;
            margin: 20px 0 30px;
            font-size: 1.1rem;
            padding-bottom: 15px;
            border-bottom: 2px solid #d1d9e6;
        }

        /* ===== Search ===== */
        .search-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }
        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
        }
        .search-box {
            width: 100%;
            padding: 16px 55px 16px 25px;
            font-size: 1.1rem;
            border: 2px solid #d1d9e6;
            border-radius: 60px;
            background: white;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            transition: 0.3s;
            outline: none;
            font-family: inherit;
            text-align: right;
        }
        .search-box:focus {
            border-color: #2563eb;
            box-shadow: 0 8px 28px rgba(37, 99, 235, 0.13);
        }
        .search-icon {
            position: absolute;
            right: 22px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1.2rem;
            pointer-events: none;
        }
        .search-clear {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1rem;
            cursor: pointer;
            display: none;
            background: #f1f5f9;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            align-items: center;
            justify-content: center;
        }
        .search-clear.visible {
            display: flex;
        }

        /* ===== Action Bar (Clear Cache) ===== */
        .action-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 18px;
            gap: 10px;
        }

        .btn-clear-cache {
            background: #f1f5f9;
            border: 1px solid #d1d9e6;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
            font-family: inherit;
        }
        .btn-clear-cache i {
            color: #2563eb;
            font-size: 1rem;
        }
        .btn-clear-cache:hover {
            background: #eef2ff;
            border-color: #2563eb;
            color: #0f2b4b;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.12);
            transform: translateY(-1px);
        }
        .btn-clear-cache:active {
            transform: scale(0.97);
        }

        .toast-message {
            background: #0f2b4b;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 999;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .toast-message.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast-message i {
            color: #4ade80;
            font-size: 1.2rem;
        }

        /* ===== Product Grid ===== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            padding: 18px 18px 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            transition: all 0.25s ease;
            border: 1px solid #e9edf2;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #2563eb, #7c3aed);
            border-radius: 0 4px 4px 0;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
            border-color: #bdd3ff;
        }

        .product-id {
            font-size: 0.7rem;
            color: #94a3b8;
            background: #f1f5f9;
            padding: 2px 12px;
            border-radius: 30px;
            align-self: flex-start;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .product-name {
            font-size: 1.15rem;
            font-weight: 600;
            color: #0a1e3c;
            margin-bottom: 6px;
            line-height: 1.4;
            min-height: 3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .product-name i {
            color: #2563eb;
            width: 1.6rem;
            font-size: 1rem;
        }

        .product-details {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 12px;
            margin-top: 4px;
            font-size: 0.9rem;
            color: #475569;
        }
        .product-details span {
            background: #f8fafc;
            padding: 2px 12px;
            border-radius: 20px;
        }
        .product-details .qty {
            color: #2563eb;
            font-weight: 600;
        }

        .product-price-wrapper {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 6px 10px;
            margin-top: 8px;
        }
        .price-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: #475569;
            background: #f1f5f9;
            padding: 2px 14px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .price-label i {
            font-size: 0.7rem;
            color: #2563eb;
        }
        .product-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1d4ed8;
            background: #eef4ff;
            display: inline-block;
            padding: 4px 18px;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }

        /* ===== No Result ===== */
        .no-result {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.4rem;
            color: #64748b;
            padding: 60px 20px;
            background: #f8fafc;
            border-radius: 48px;
            border: 2px dashed #dce2ec;
        }

        /* ===== Footer ===== */
        .footer {
            margin-top: 50px;
            padding: 25px 20px 20px;
            text-align: center;
            border-top: 2px solid #e9edf2;
            background: white;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.02);

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;

        .footer-brand {

            align-items: center;
            gap: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #0f2b4b;

            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.25);
        }

            color: #2563eb;
            font-weight: 700;
        }
        .footer-sub {
            font-size: 0.85rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .footer-divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            border-radius: 10px;
            margin: 4px auto;
        }

        .stats {
            text-align: center;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 20px;
            padding: 12px;
        }

                padding: 16px 18px;
                gap: 12px;
            }
            .logo-section {
                justify-content: center;
            }
            .app-logo {

                height: 48px;
                font-size: 1.5rem;
                border-radius: 14px;
            }
            h1 {
                font-size: 1.5rem;
            }
            .header-stats {
                justify-content: center;
                font-size: 0.8rem;
                padding: 6px 14px;
            }
            .products-grid {
                grid-template-columns: 1fr 1fr;
                gap: 14px;
            }
            .product-card {
                padding: 14px 12px;
            }
            .product-name {
                font-size: 0.95rem;
                min-height: 2.4rem;
            }
            .product-price {

                padding: 2px 14px;
            }
            .product-details {
                font-size: 0.8rem;
            }
            .action-bar {
                justify-content: center;
            }
        }

        @media (max-width: 430px) {
            .products-grid {

            }
            .app-logo {
                width: 42px;
                height: 42px;
                font-size: 1.3rem;
            }
            h1 {
                font-size: 1.3rem;
            }

    </style>
</head>

            { id: 214, name: "شامبو كلير ضد القشرة ١٨٠ مل صغير", qty: 1, wholesale: 65, retail: "75 - 85" },
            { id: 215, name: "حمام كريم فاتيكا ١ كيلو", qty: 1, wholesale: 108, retail: "120" },

        ];

        // ================================================================
        //  DOM references
        // ================================================================
        const grid = document.getElementById('productGrid');
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearSearch');
        const productCount = document.getElementById('productCount');
        const totalCount = document.getElementById('totalCount');
        const statsTotal = document.getElementById('statsTotal');
        const clearCacheBtn = document.getElementById('clearCacheBtn');
        const toast = document.getElementById('toastMessage');
        const toastText = document.getElementById('toastText');

        totalCount.textContent = products.length;
        statsTotal.textContent = products.length;

        // ================================================================
        //  أيقونة المنتج
        // ================================================================
        function getProductIcon(name) {
            if (name.includes('صابون')) return 'fa-soap';
            if (name.includes('فرشاة') || name.includes('فرشة')) return 'fa-brush';
            if (name.includes('معجون')) return 'fa-toothbrush';
            if (name.includes('ليفة')) return 'fa-hand-sparkles';
            if (name.includes('بخور')) return 'fa-leaf';
            if (name.includes('كلوركس') || name.includes('بريكس')) return 'fa-bottle-water';
            if (name.includes('مكن')) return 'fa-bolt';
            if (name.includes('شفرات') || name.includes('امواس')) return 'fa-cut';
            if (name.includes('مناديل')) return 'fa-box';
            if (name.includes('ديتول')) return 'fa-shield-halved';
            if (name.includes('بخاخ')) return 'fa-spray-can-sparkles';
            if (name.includes('كريم')) return 'fa-cream';
            if (name.includes('شاور')) return 'fa-shower';
            if (name.includes('مسواك')) return 'fa-tooth';
            if (name.includes('حفاضات')) return 'fa-baby';
            if (name.includes('مبيد') || name.includes('حشرات')) return 'fa-bug';
            if (name.includes('بريل') || name.includes('منظف')) return 'fa-bucket';
            if (name.includes('ملمع')) return 'fa-spray-can';
            if (name.includes('جل')) return 'fa-droplet';
            if (name.includes('بودرة')) return 'fa-flask';
            if (name.includes('فوط')) return 'fa-heart';
            return 'fa-cube';
        }

        // ================================================================
        //  عرض المنتجات
        // ================================================================
        function renderProducts(filter = '') {
            const filterLower = filter.trim().toLowerCase();
            let filtered = products;
            if (filterLower !== '') {
                filtered = products.filter(p =>
                    p.name.toLowerCase().includes(filterLower) ||
                    p.id.toString().includes(filterLower)
                );
            }
            productCount.textContent = filtered.length;

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="no-result">
                        <i class="fas fa-box-open" style="margin-left: 12px; font-size:2rem; display:block; margin-bottom:12px; color:#2563eb;"></i>
                        لا توجد منتجات تطابق "<strong>${filter}</strong>"
                        <br><span style="font-size:0.9rem; color:#94a3b8;">جرب كلمة بحث مختلفة</span>
                    </div>
                `;
                return;
            }

            let html = '';
            filtered.forEach(p => {
                const icon = getProductIcon(p.name);
                const retailDisplay = p.retail && p.retail !== '-' ? p.retail : 'غير محدد';
                html += `
                    <div class="product-card">
                        <div class="product-id">#${p.id}</div>
                        <div class="product-name">
                            <i class="fas ${icon}"></i> ${p.name}
                        </div>
                        <div class="product-details">
                            <span class="qty"><i class="fas fa-box"></i> الكمية: ${p.qty}</span>
                            <span><i class="fas fa-coins"></i> الجملة: ${p.wholesale} جنيه</span>
                        </div>
                        <div class="product-price-wrapper">
                            <span class="price-label">
                                <i class="fas fa-tag"></i> سعر البيع للمستهلك
                            </span>
                            <span class="product-price">${retailDisplay} جنيه</span>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        // ================================================================
        //  البحث
        // ================================================================
        searchInput.addEventListener('input', function() {
            const val = this.value;
            renderProducts(val);
            clearBtn.classList.toggle('visible', val.length > 0);
        });

        clearBtn.addEventListener('click', function() {
            searchInput.value = '';
            renderProducts('');
            this.classList.remove('visible');
            searchInput.focus();
        });

        // ================================================================
        //  حذف الكاش
        // ================================================================
        function showToast(msg) {
            toastText.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        clearCacheBtn.addEventListener('click', async function() {
            if ('caches' in window) {
                try {
                    const cacheNames = await caches.keys();
                    for (const name of cacheNames) {
                        if (name.includes('price-list') || name === 'v1' || name.startsWith('sw-cache')) {
                            await caches.delete(name);
                        }
                    }
                } catch (e) {
                    console.warn('Cache clear error:', e);
                }
            }

            showToast('جاري تحديث الصفحة ...');
            setTimeout(() => {
                window.location.reload(true);
            }, 600);
        });

        // ================================================================
        //  السنة الحالية
        // ================================================================
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // ================================================================
        //  العرض الأولي
        // ================================================================
        renderProducts();

        // ================================================================
        //  Service Worker
        // ================================================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('✅ Service Worker مسجل'))
                .catch(err => console.log('❌ خطأ في SW:', err));
        }
    </script>
</body>
