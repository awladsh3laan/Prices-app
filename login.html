<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول - منتجات شعلان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ef4444">
</head>
<body>

    <div class="container">

        <!-- ===== Header ===== -->
        <header class="app-header">
            <div class="logo-section">
                <div class="app-logo">
                    <i class="fas fa-star"></i>
                </div>
                <div class="title-wrapper">
                    <h1>
                        قائمة <span>أسعار</span>
                        <span class="offline-badge">
                            <i class="fas fa-wifi"></i> Offline
                        </span>
                    </h1>
                    <div class="subtitle">
                        <i class="fas fa-circle-check"></i>
                        منتجات <span style="font-weight:600; color:#0f172a;">شعلان</span>
                        <i class="fas fa-circle-check"></i>
                    </div>
                </div>
            </div>

            <button class="hamburger" onclick="toggleHamburger()" aria-label="القائمة">
                <i class="fas fa-bars"></i>
            </button>

            <nav class="nav-menu" id="navMenu">
                <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="dashboard.html"><i class="fas fa-cog"></i> لوحة التحكم</a>
                <a href="login.html" class="active"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</a>
            </nav>
        </header>

        <!-- ===== Login Form ===== -->
        <div class="login-container">
            <div class="logo">
                <i class="fas fa-lock"></i>
            </div>
            <h2>تسجيل الدخول</h2>
            <p class="sub-text">أدخل بياناتك للوصول إلى لوحة التحكم</p>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> اسم المستخدم</label>
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="أدخل اسم المستخدم" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> كلمة المرور</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="width:100%; justify-content:center;">
                    <i class="fas fa-sign-in-alt"></i>
                    تسجيل الدخول
                </button>
            </form>

            <p style="text-align:center; margin-top:16px; color:#94a3b8; font-size:0.85rem;">
                <i class="fas fa-info-circle"></i>
                للتواصل مع المدير للحصول على البيانات
            </p>
        </div>

        <!-- ===== Toast ===== -->
        <div class="toast-message" id="toastMessage">
            <i class="fas fa-check-circle"></i>
            <span id="toastText">تم التحديث بنجاح</span>
        </div>

        <!-- ===== Footer ===== -->
        <footer class="footer">
            <div class="footer-content">
                <div class="footer-divider"></div>
                <div class="footer-brand">
                    <span class="signature-icon">
                        <i class="fas fa-crown"></i>
                    </span>
                    <span>
                        تم إنشاء هذه الصفحة بواسطة <span class="name">مصطفى علوان</span>
                    </span>
                </div>
                <div class="footer-sub">
                    <i class="fas fa-calendar-alt"></i>
                    <span id="currentYear"></span>
                    <span>•</span>
                    <i class="fas fa-shield-alt"></i>
                    <span>جميع الحقوق محفوظة</span>
                </div>
            </div>
        </footer>
    </div>

    <!-- ===== Firebase ===== -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>

    <script>
        // ================================================================
        //  تسجيل الدخول
        // ================================================================

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showToast('يرجى إدخال اسم المستخدم وكلمة المرور', 'error');
                return;
            }

            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
            btn.disabled = true;

            try {
                const success = await loginAdmin(username, password);

                if (success) {
                    showToast('✅ تم تسجيل الدخول بنجاح', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 800);
                } else {
                    showToast('❌ اسم المستخدم أو كلمة المرور غير صحيحة', 'error');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('خطأ في تسجيل الدخول:', error);
                showToast('❌ حدث خطأ، يرجى المحاولة مرة أخرى', 'error');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // ================================================================
        //  التحقق من حالة الدخول
        // ================================================================

        const isLoggedIn = sessionStorage.getItem('isLoggedIn');
        if (isLoggedIn === 'true') {
            // إذا كان مسجل دخول بالفعل، يوجه للوحة التحكم
            window.location.href = 'dashboard.html';
        }

        // ================================================================
        //  السنة الحالية
        // ================================================================

        document.getElementById('currentYear').textContent = new Date().getFullYear();
    </script>

</body>
</html>
